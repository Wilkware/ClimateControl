<!doctype html>
<html lang="de">

<head>
    <title>ClimateControl</title>
    <meta charset="UTF-8" />
    <style>
        :root {
            --color-cold: #11A0F3;
            --color-warm: #F35A2C;
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: transparent;
            border-radius: 10px;
        }

        html,
        body {
            margin: 0px;
            height: 100%;
            width: 100%;
        }

        #card {
            width: 100%;
            height: 100%;
            padding: var(--margin-top) var(--margin-side) var(--margin-bottom);
        }

        #content {
            width: 100%;
            height: 100%;
            container-type: size;
        }

        /* ── Grid ────────────────────────────────────────────────────────── */
        .grid {
            display: grid;
            width: 100%;
            height: 100%;
            gap: 0px;
            grid-template-columns: repeat(3, 1fr);
            grid-template-areas:
                "left center right"
                ". bottom .";
            container-type: size;
        }

        /* ── Grid: Mapping ───────────────────────────────────────────────── */
        .left {
            grid-area: left;
        }

        .center {
            grid-area: center;
        }

        .right {
            grid-area: right;
        }

        .bottom {
            grid-area: bottom;
        }

        .grid>div {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 0;
            min-width: 0;
            height: 100%;
            width: 100%;
        }

        /* ── Grid: tall or squareh ───────────────────────────────────────── */
        @container (max-aspect-ratio: 1.15) {
            .grid {
                grid-template-columns: 1fr;
                grid-template-rows: 80% 20%;
                grid-template-areas:
                    "center"
                    "bottom";
            }
            .grid .left,
            .grid .right {
                display: none;
            }
        }

        /* ── Grid: wider than it is tall ─────────────────────────────────── */
        @container (min-aspect-ratio: 1.15) {
            .grid {
                grid-template-columns: 15% 70% 15%;
                grid-template-rows: 80% 20%;
                grid-template-areas:
                    "left center right"
                    ". bottom .";
            }
        }

        /* ── Buttons: left & right ───────────────────────────────────────── */
        .cc-button {
            aspect-ratio: 1 / 1;
            width: min(100%, 50px);
            background: color-mix(in srgb, var(--content-color) 4%, transparent);
            border-radius: 50%;
            font-size: clamp(12px, 35cqw, 26px);
            line-height: 1;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            -webkit-tap-highlight-color: transparent;
        }

        .cc-button:hover {
            background: color-mix(in srgb, var(--content-color) 9%, transparent);
        }

        .cc-button:active {
            background: color-mix(in srgb, var(--content-color) 15%, transparent);
        }

        #button-minus {
            color: var(--color-cold);
            border: 1.5px solid color-mix(in srgb, var(--color-cold) 16%, transparent);
            border-color: color-mix(in srgb, var(--color-cold) 28%, transparent);
        }

        #button-plus {
            color: var(--color-warm);
            border: 1.5px solid color-mix(in srgb, var(--color-warm) 16%, transparent);
            border-color: color-mix(in srgb, var(--color-warm) 28%, transparent);
        }

        /* ── Gauge: center ───────────────────────────────────────────────── */
        .center {
            container-type: size;
        }

        .cc-gauge {
            position: relative;
            overflow: hidden;
            width: min(100cqw, 130.43cqh);
            aspect-ratio: 240 / 184;
            container-type: inline-size;
        }

        .cc-gauge-track {
            stroke: color-mix(in srgb, var(--content-color) 10%, transparent);
        }
        
        #gauge-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: auto;
            aspect-ratio: 1;
            touch-action: none;
            cursor: default;
        }

        #arc-hitzone {
            cursor: pointer;
        }

        #dot-group {
            cursor: grab;
        }

        #dot-group.dragging {
            cursor: grabbing;
        }

        .cc-gauge-info {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-top: clamp(10px, 12cqw, 40px);
            pointer-events: none;
        }

        .cc-gauge-status {
            display: flex;
            gap: clamp(4px, 5cqw, 16px);
            align-items: center;
            margin-bottom: clamp(3px, 3cqw, 12px);
            pointer-events: all;
        }

        .cc-gauge-status-button {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(1px, 1cqw, 4px);
            cursor: pointer;
            padding: clamp(3px, 2cqw, 8px);
            border-radius: clamp(5px, 3cqw, 12px);
            transition: background 0.15s;
        }

        .cc-gauge-status-button:hover {
            background: color-mix(in srgb, var(--content-color) 6%, transparent);
        }

        .cc-gauge-status-button svg {
            font-size: clamp(13px, 9cqw, 26px);
            color: color-mix(in srgb, var(--content-color) 22%, transparent);
            transition: color 0.18s;
        }

        .cc-gauge-status-button.on svg {
            color: var(--status-color);
        }

        .cc-gauge-status-button.on .cc-gauge-status-label {
            color: var(--status-color);
            opacity: 1;
        }

        .cc-gauge-status-label {
            font-size: clamp(6.5px, 3.2cqw, 10px);
            letter-spacing: 0.09em;
            text-transform: uppercase;
            color: var(--content-color);
            opacity: 0.5;
            white-space: nowrap;
            transition: color 0.18s, opacity 0.18s;
        }

        .cc-gauge-status-divider {
            width: 1px;
            height: clamp(10px, 6cqw, 22px);
            background: color-mix(in srgb, var(--content-color) 10%, transparent);
        }

        .cc-gauge-actual-row {
            display: flex;
            align-items: center;
            gap: clamp(4px, 2.5cqw, 10px);
            margin-bottom: clamp(4px, 0.6cqw, 8px);
        }

        .cc-gauge-temp-actual {
            font-size: clamp(12px, 4.2cqw, 18px);
            color: var(--content-color);
            opacity: 0.5;
            display: flex;
            align-items: center;
            gap: clamp(2px, 1cqw, 6px);
        }

        .cc-gauge-temp-actual svg {
            font-size: clamp(12px, 4.2cqw, 18px);
        }

        .cc-gauge-humidity,
        .cc-gauge-valve {
            font-size: clamp(10px, 3.6cqw, 14px);
            color: color-mix(in srgb, var(--content-color) 65%, transparent);
            background: color-mix(in srgb, var(--content-color) 9%, transparent);
            display: flex;
            align-items: center;
            gap: clamp(2px, 1cqw, 5px);
            padding: clamp(1px, 0.8cqw, 3px) clamp(6px, 2.2cqw, 10px);
            border-radius: 999px;
        }

        .cc-gauge-humidity svg,
        .cc-gauge-valve svg {
            font-size: clamp(9px, 3.2cqw, 13px);
        }

        .cc-gauge-temp-target {
            font-size: clamp(22px, 17cqw, 52px);
            line-height: 1;
        }

        .cc-gauge-temp-unit {
            font-size: clamp(14px, 8cqw, 20px);
            opacity: 0.5;
            vertical-align: super;
            margin-left: 1px;
        }

        /* ── Mode: bottom ────────────────────────────────────────────────── */
        .bottom {
            container-type: size;
        }

        .cc-mode-row {
            display: flex;
            gap: clamp(0px, 1cqw, 6px);
            align-items: center;
            justify-content: center;
            width: 100%;
            flex-wrap: wrap;
        }

        .cc-mode-button {
            display: flex;
            flex-direction: column;
            align-items: center;
            top: 10%;
            gap: clamp(1px, 3cqh, 4px);
            cursor: pointer;
            padding: clamp(2px, 4cqh, 6px) clamp(3px, 2cqw, 10px);
            border-radius: clamp(5px, 4cqh, 10px);
            min-width: clamp(24px, 12cqw, 56px);
            transition: background 0.15s;
        }

        .cc-mode-button:hover {
            background: color-mix(in srgb, var(--content-color) 6%, transparent);
        }

        .cc-mode-button svg {
            width: clamp(12px, 50cqh, 24px);
            height: clamp(12px, 50cqh, 24px);
            color: color-mix(in srgb, var(--content-color) 20%, transparent);
            transition: color 0.18s;
        }

        .cc-mode-button .cc-mode-label {
            font-size: clamp(7px, 12cqh, 9px);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--content-color);
            opacity: 0.45;
            white-space: nowrap;
            transition: color 0.18s, opacity 0.18s;
        }

        .cc-mode-button.active svg {
            color: var(--color-mode);
        }

        .cc-mode-button.active .cc-mode-label {
            color: var(--color-mode);
            opacity: 1;
        }
    </style>
    <script src="/icons.js" crossorigin="anonymous"></script>
</head>

<body>
    <div id="card">
        <div id="content">
            <div class="grid">
                <div class="left">
                    <button class="cc-button" id="button-minus" aria-label="-">−</button>
                </div>
                <div class="center">
                    <div class="cc-gauge">
                        <svg id="gauge-svg" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
                            <defs>
                                <linearGradient id="arcGrad" gradientUnits="userSpaceOnUse">
                                    <stop id="gs0" offset="0%" />
                                    <stop id="gs100" offset="100%" />
                                </linearGradient>
                            </defs>
                            <path id="arc-bg" fill="none" stroke-width="6"
                                stroke-linecap="round" class="cc-gauge-track" />
                            <path id="arc-fill" fill="none" stroke="url(#arcGrad)" stroke-width="6"
                                stroke-linecap="round" />
                            <path id="arc-hitzone" fill="none" stroke="transparent" stroke-width="30"
                                stroke-linecap="round" />
                            <g id="dot-group">
                                <circle id="dot-glow" r="17" opacity="0.12" />
                                <circle id="dot" r="10" />
                            </g>
                        </svg>

                        <div class="cc-gauge-info">
                            <div class="cc-gauge-status" id="status-row"></div>

                            <div class="cc-gauge-actual-row" id="actual-row">
                                <div class="cc-gauge-valve" id="valve-row" style="display:none">
                                    <i class="fa-light fa-arrow-down-short-wide"></i>
                                    <span id="valve-display"></span>%
                                </div>
                                <div class="cc-gauge-temp-actual">
                                    <i class="fa-light fa-thermometer-empty"></i>
                                    <span id="ist-display">15.2</span>°C
                                </div>
                                <div class="cc-gauge-humidity" id="humidity-row" style="display:none">
                                    <i class="fa-light fa-droplet"></i>
                                    <span id="humidity-display"></span>%
                                </div>
                            </div>
                            <div class="cc-gauge-temp-target">
                                <span id="soll-display">18.0</span><span class="cc-gauge-temp-unit">°C</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="right">
                    <button class="cc-button" id="button-plus" aria-label="+">+</button>
                </div>

                <div class="bottom">
                    <div class="cc-mode-row" id="mode-row"></div>
                </div>

            </div>
        </div>
    </div>

    <script>
        // ── INIT: set root/style variables ───────────────────────────────────
        const p = new URLSearchParams(location.search);
        const root = document.documentElement;
        const m = {
            margintop: ['--margin-top'],
            marginside: ['--margin-side'],
            marginbottom: ['--margin-bottom']
        };
        for (const k in m) {
            const v = p.get(k);
            if (!v) continue; m[k].forEach(c => root.style.setProperty(c, v));
        }

        // ── STATE: ───────────────────────────────────────────────────────────
        const TEMP_MIN = 4.5, TEMP_MAX = 30.5;
        const cs = getComputedStyle(root);
        let colorCold = cs.getPropertyValue('--color-cold').trim() || '#11A0F3';
        let colorWarm = cs.getPropertyValue('--color-warm').trim() || '#F35A2C';
        let tempTarget = 18.0;
        let tempActual = 15.0;
        let relativeHumidity = null;
        let valveLevel = null;
        let statusLeft = false;
        let statusRight = false;
        let statusLabels = false;
        let statusData = [
            { variable: 0, name: 'Fenster', value: false, icon: 'window-frame-open', color: '#5ba8e8' },
            { variable: 0, name: 'Prognose', value: false, icon: 'sun', color: '#e8b44a' }
        ];
        let modeLabels = false;
        let modeActive = 'program';
        let modeData = [
            { value: 'vacation', name: 'Urlaub', icon: 'suitcase-rolling', color: '#5ba8e8' },
            { value: 'program', name: 'Programm', icon: 'calendar-clock', color: '#6dd68a' },
            { value: 'manual', name: 'Manuell', icon: 'hand-back-point-up', color: '#e8c44a' },
            { value: 'pause', name: 'Pause', icon: 'pause', color: '#e89a4a' },
            { value: 'off', name: 'Aus', icon: 'power-off', color: '#e86a6a' }
        ];

        // ── GAUGE : arc geometry (viewBox 240×240, r=100) 150° → 240° clockwise
        const CX = 120, CY = 120, R = 100;
        const ARC_START = 150, ARC_SPAN = 240;
        const toRad = d => d * Math.PI / 180;
        const toDeg = r => r * 180 / Math.PI;

        function polarXY(deg) {
            const a = toRad(deg);
            return { x: CX + R * Math.cos(a), y: CY + R * Math.sin(a) };
        }
        function svgArc(s, span) {
            if (span <= 0.01) { const p = polarXY(s); return `M ${p.x.toFixed(2)} ${p.y.toFixed(2)}`; }
            if (span >= 360) span = 359.99;
            const a = polarXY(s), b = polarXY(s + span);
            return `M ${a.x.toFixed(2)} ${a.y.toFixed(2)} A ${R} ${R} 0 ${span > 180 ? 1 : 0} 1 ${b.x.toFixed(2)} ${b.y.toFixed(2)}`;
        }
        const tempToT = t => (Math.max(TEMP_MIN, Math.min(TEMP_MAX, t)) - TEMP_MIN) / (TEMP_MAX - TEMP_MIN);
        const tToTemp = t => TEMP_MIN + t * (TEMP_MAX - TEMP_MIN);

        // ── COLOR: ───────────────────────────────────────────────────────────
        const hexToRgb = h => [parseInt(h.slice(1, 3), 16), parseInt(h.slice(3, 5), 16), parseInt(h.slice(5, 7), 16)];
        function lerpColor(a, b, t) {
            const [r1, g1, b1] = hexToRgb(a), [r2, g2, b2] = hexToRgb(b);
            const ch = v => Math.round(v).toString(16).padStart(2, '0');
            return '#' + ch(r1 + (r2 - r1) * t) + ch(g1 + (g2 - g1) * t) + ch(b1 + (b2 - b1) * t);
        }

        // ── RENDER: areas ────────────────────────────────────────────────────
        function renderGauge() {
            const hasTarget = tempTarget !== null && tempTarget !== '' && !isNaN(tempTarget);
            const hasActual = tempActual !== null && tempActual !== '' && !isNaN(tempActual);

            const t = hasTarget ? tempToT(tempTarget) : 0;
            const fillSpan = hasTarget ? t * ARC_SPAN : 0;
            const dotAngle = ARC_START + fillSpan;
            const dotPt = polarXY(dotAngle);
            const dotColor = lerpColor(colorCold, colorWarm, t);
            const startPt = polarXY(ARC_START);
            const endPt = polarXY(ARC_START + ARC_SPAN);

            document.getElementById('arc-bg').setAttribute('d', svgArc(ARC_START, ARC_SPAN));
            document.getElementById('arc-fill').setAttribute('d', fillSpan > 0 ? svgArc(ARC_START, fillSpan) : '');
            document.getElementById('arc-hitzone').setAttribute('d', svgArc(ARC_START, ARC_SPAN));

            const grad = document.getElementById('arcGrad');
            grad.setAttribute('x1', startPt.x.toFixed(1));
            grad.setAttribute('y1', startPt.y.toFixed(1));
            grad.setAttribute('x2', endPt.x.toFixed(1));
            grad.setAttribute('y2', endPt.y.toFixed(1));
            document.getElementById('gs0').setAttribute('stop-color', colorCold);
            document.getElementById('gs100').setAttribute('stop-color', colorWarm);

            document.getElementById('dot-group').style.display = hasTarget ? '' : 'none';
            document.getElementById('dot-group').setAttribute('transform', `translate(${dotPt.x.toFixed(2)},${dotPt.y.toFixed(2)})`);
            document.getElementById('dot').setAttribute('fill', dotColor);
            document.getElementById('dot-glow').setAttribute('fill', dotColor);

            document.getElementById('soll-display').textContent = hasTarget ? tempTarget.toFixed(1) : '--';
            document.getElementById('ist-display').textContent = hasActual ? parseFloat(tempActual).toFixed(1) : '--';

            const hasHumidity = relativeHumidity !== null && relativeHumidity !== '' && !isNaN(relativeHumidity);
            document.getElementById('humidity-row').style.display = hasHumidity ? '' : 'none';
            if (hasHumidity) {
                document.getElementById('humidity-display').textContent = Math.round(relativeHumidity);
            }

            const hasValve = valveLevel !== null && valveLevel !== '' && !isNaN(valveLevel);
            document.getElementById('valve-row').style.display = hasValve ? '' : 'none';
            if (hasValve) {
                document.getElementById('valve-display').textContent = Math.round(valveLevel);
            }
        }

        // ── BUILD: status buttons (left/right slots) from statusData ──────────
        function buildStatusButtons() {
            const row = document.getElementById('status-row');
            if (!Array.isArray(statusData)) {
                console.log('statusData is not an array, skipping rebuild:', statusData);
                return;
            }
            const isValidVariable = v => {
                const n = Number(v);
                return n !== 0 && n !== 1 && n >= 10000;
            };
            const slots = statusData.filter(item => isValidVariable(item.variable)).slice(0, 2);

            row.innerHTML = '';
            slots.forEach((item, i) => {
                if (i === 1) {
                    const divider = document.createElement('div');
                    divider.className = 'cc-gauge-status-divider';
                    row.appendChild(divider);
                }
                if (i === 0) { statusLeft = Boolean(item.value); }
                else { statusRight = Boolean(item.value); }

                const btn = document.createElement('div');
                btn.className = 'cc-gauge-status-button';
                btn.id = i === 0 ? 'button-left' : 'button-right';
                btn.title = item.name;
                btn.dataset.variable = item.variable;
                btn.style.setProperty('--status-color', item.color);
                btn.innerHTML =
                    `<i class="fa-light fa-${item.icon}"></i>` +
                    `<span class="cc-gauge-status-label">${item.name}</span>`;
                btn.addEventListener('click', () => {
                    const current = i === 0 ? statusLeft : statusRight;
                    requestAction('status_' + item.variable, !current);
                });
                row.appendChild(btn);
            });
        }

        // ── BUILD: mode buttons from modeData ──────────────────────────────────
        function buildModeButtons() {
            const row = document.getElementById('mode-row');
            if (!Array.isArray(modeData)) {
                console.log('modeData is not an array, skipping rebuild:', modeData);
                return;
            }
            row.innerHTML = '';
            modeData.forEach(item => {
                const btn = document.createElement('div');
                btn.className = 'cc-mode-button';
                btn.title = item.name;
                btn.dataset.value = String(item.value);
                btn.dataset.color = item.color;
                btn.innerHTML =
                    `<i class="fa-light fa-${item.icon}"></i>` +
                    `<span class="cc-mode-label">${item.name}</span>`;
                btn.addEventListener('click', () => {
                    requestAction('mode', item.value);
                });
                row.appendChild(btn);
            });
        }

        function renderStatus() {
            const left = document.getElementById('button-left');
            const right = document.getElementById('button-right');
            if (left) left.classList.toggle('on', statusLeft);
            if (right) right.classList.toggle('on', statusRight);
            document.querySelectorAll('.cc-gauge-status-label').forEach(el => {
                el.style.display = statusLabels ? '' : 'none';
            });
        }

        function renderMode() {
            document.querySelectorAll('.cc-mode-button').forEach(btn => {
                const on = btn.dataset.value === String(modeActive);
                btn.classList.toggle('active', on);
                btn.style.setProperty('--color-mode', btn.dataset.color);
            });
            document.querySelectorAll('.cc-mode-label').forEach(el => {
                el.style.display = modeLabels ? '' : 'none';
            });
        }

        // ── GAUGE: drag temperature ──────────────────────────────────────────
        const svgEl = document.getElementById('gauge-svg');
        let dragging = false;

        function svgPoint(e) {
            const rect = svgEl.getBoundingClientRect();
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: (cx - rect.left) * (240 / rect.width), y: (cy - rect.top) * (240 / rect.height) };
        }
        function angleFromPt(px, py) {
            let d = toDeg(Math.atan2(py - CY, px - CX));
            return d < 0 ? d + 360 : d;
        }
        function angleToT(deg) {
            return ((deg - ARC_START) + 360) % 360 / ARC_SPAN;
        }
        function setTempFromPtr(e) {
            const pt = svgPoint(e);
            const t = Math.max(0, Math.min(1, angleToT(angleFromPt(pt.x, pt.y))));
            tempTarget = Math.round(tToTemp(t) * 2) / 2;
            renderGauge();
        }

        const dotGroup = document.getElementById('dot-group');
        dotGroup.addEventListener('pointerdown', e => {
            e.stopPropagation(); dragging = true;
            dotGroup.classList.add('dragging');
            dotGroup.setPointerCapture(e.pointerId);
        });
        dotGroup.addEventListener('pointermove', e => { if (dragging) setTempFromPtr(e); });
        dotGroup.addEventListener('pointerup', () => {
            dragging = false; dotGroup.classList.remove('dragging');
            requestAction('temperature', tempTarget);
        });
        dotGroup.addEventListener('pointercancel', () => { dragging = false; dotGroup.classList.remove('dragging'); });
        document.getElementById('arc-hitzone').addEventListener('click', e => {
            if (!dragging) { setTempFromPtr(e); requestAction('temperature', tempTarget); }
        });

        // ── GAUGE: buttons (with repeat on hold) ─────────────────────────────
        function changeTemp(delta) {
            tempTarget = Math.round(Math.max(TEMP_MIN, Math.min(TEMP_MAX, tempTarget + delta)) * 2) / 2;
            renderGauge();
        }
        function makeRepeat(btnId, delta) {
            const btn = document.getElementById(btnId);
            let timer = null, interval = null;
            function stop() {
                clearTimeout(timer); clearInterval(interval);
                requestAction('temperature', tempTarget);
            }
            btn.addEventListener('pointerdown', e => {
                e.preventDefault();
                changeTemp(delta);
                timer = setTimeout(() => { interval = setInterval(() => changeTemp(delta), 80); }, 400);
            });
            btn.addEventListener('pointerup', stop);
            btn.addEventListener('pointercancel', stop);
            btn.addEventListener('pointerleave', stop);
        }
        makeRepeat('button-minus', -0.5);
        makeRepeat('button-plus', +0.5);

        // ── SDK: handleMessage (data transfer) ───────────────────────────────
        function handleMessage(encodedData) {
            const decodedData = JSON.parse(encodedData);
            let needsGauge = false;
            let needsStatus = false;
            let needsMode = false;

            for (const parameter in decodedData) {
                console.log('Parameter:', parameter, 'Wert:', decodedData[parameter]);
                switch (parameter) {
                    case 'colorCold':
                        colorCold = decodedData[parameter]; root.style.setProperty('--color-cold', colorCold); needsGauge = true; break;
                    case 'colorWarm':
                        colorWarm = decodedData[parameter]; root.style.setProperty('--color-warm', colorWarm); needsGauge = true; break;
                    case 'tempTarget':
                        tempTarget = (decodedData[parameter] === '' || decodedData[parameter] === null || decodedData[parameter] === undefined)
                            ? null : parseFloat(decodedData[parameter]);
                        needsGauge = true; break;
                    case 'tempActual':
                        tempActual = (decodedData[parameter] === '' || decodedData[parameter] === null || decodedData[parameter] === undefined)
                            ? null : parseFloat(decodedData[parameter]);
                        needsGauge = true; break;
                    case 'relativeHumidity':
                        relativeHumidity = (decodedData[parameter] === '' || decodedData[parameter] === null || decodedData[parameter] === undefined)
                            ? null : parseFloat(decodedData[parameter]);
                        needsGauge = true; break;
                    case 'valveLevel':
                        valveLevel = (decodedData[parameter] === '' || decodedData[parameter] === null || decodedData[parameter] === undefined)
                            ? null : parseFloat(decodedData[parameter]);
                        needsGauge = true; break;
                    case 'statusLeft':
                        statusLeft = Boolean(decodedData[parameter]); needsStatus = true; break;
                    case 'statusRight':
                        statusRight = Boolean(decodedData[parameter]); needsStatus = true; break;
                    case 'statusLabels':
                        statusLabels = Boolean(decodedData[parameter]); needsStatus = true; break;
                    case 'statusData':
                        statusData = decodedData[parameter]; buildStatusButtons(); needsStatus = true; break;
                    case 'modeLabels':
                        modeLabels = Boolean(decodedData[parameter]); needsMode = true; break;
                    case 'modeActive':
                        modeActive = decodedData[parameter]; needsMode = true; break;
                    case 'modeData':
                        modeData = decodedData[parameter]; buildModeButtons(); needsMode = true; break;
                    default:
                        console.log('Unbekannter Parameter:', parameter);
                }
            }
            if (needsGauge) renderGauge();
            if (needsStatus) renderStatus();
            if (needsMode) renderMode();
        }

        // ── INIT: ────────────────────────────────────────────────────────────
        buildStatusButtons();
        buildModeButtons();
        renderGauge();
        renderStatus();
        renderMode();
    </script>
</body>
